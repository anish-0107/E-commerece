<div class="orders-container">
  <h2 class="section-title">Order History</h2>

  <div class="orders-grid">
    @for (order of orderHistory; track order.Orderid) {
      <div class="order-card">
        <div class="card-header">
          <span class="order-id">Order #{{ order.Orderid}}</span>
          <span class="order-date">{{ order.orderDate}}</span>
        </div>

        <div class="card-body">
          <div class="info-row">
            <span class="label">Total Amount:</span>
            <span class="value price">₹{{ order.totalAmount }}</span>
          </div>
          
          <div class="info-row">
            <span class="label">Payment:</span>
            <span class="value method">{{ order.paymentMethod| uppercase }}</span>
          </div>

          <div class="items-summary">
            <p><strong>Items:</strong> {{ order.items.length }} product(s)</p>
          </div>
        </div>

        <div class="card-footer">
          <button class="btn-details" [routerLink]="['/user/orderDetails',order.Orderid]">View Details</button>
        </div>
      </div>
    } @empty {
      <div class="no-orders">
        <p>No orders found.</p>
      </div>
    }
  </div>
</div>
